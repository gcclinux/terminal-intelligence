<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Intelligence User Manual</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-card: rgba(24, 24, 27, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        /* Nav */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(9, 9, 11, 0.9);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Fira Code', monospace;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            text-decoration: none;
        }

        .logo span {
            color: var(--accent-primary);
        }

        .btn-back {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
            font-size: 0.95rem;
        }

        .btn-back:hover {
            color: var(--accent-primary);
        }

        main {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px 80px;
        }

        /* Markdown styling */
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4,
        .markdown-body h5,
        .markdown-body h6 {
            color: var(--text-main);
            margin-top: 32px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
        }

        .markdown-body h1 {
            font-size: 2.5em;
            padding-bottom: 0.3em;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .markdown-body h2 {
            font-size: 1.75em;
            padding-bottom: 0.3em;
            border-bottom: 1px solid var(--border-color);
        }

        .markdown-body h3 {
            font-size: 1.35em;
        }

        .markdown-body p,
        .markdown-body blockquote,
        .markdown-body ul,
        .markdown-body ol,
        .markdown-body dl,
        .markdown-body table,
        .markdown-body pre,
        .markdown-body details {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.05rem;
        }

        .markdown-body a {
            color: var(--accent-primary);
            text-decoration: none;
        }

        .markdown-body a:hover {
            text-decoration: underline;
        }

        .markdown-body code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 0.9em;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-family: 'Fira Code', monospace;
            color: #38bdf8;
        }

        .markdown-body pre {
            padding: 20px;
            overflow: auto;
            font-size: 0.9em;
            line-height: 1.45;
            background-color: #0d1117;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .markdown-body pre code {
            display: inline;
            max-width: auto;
            padding: 0;
            margin: 0;
            overflow: visible;
            line-height: inherit;
            word-wrap: normal;
            background-color: transparent;
            border: 0;
            color: #c9d1d9;
        }

        .markdown-body blockquote {
            padding: 0.5em 1em;
            color: var(--text-muted);
            border-left: 0.25em solid var(--accent-primary);
            background: rgba(56, 189, 248, 0.05);
            border-radius: 0 4px 4px 0;
        }

        .markdown-body ul,
        .markdown-body ol {
            padding-left: 2em;
        }

        .markdown-body li {
            margin-bottom: 0.3em;
        }

        .markdown-body hr {
            height: 1px;
            background-color: var(--border-color);
            border: none;
            margin: 2em 0;
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-top: 100px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>
    <nav>
        <a href="/" class="logo">
            <span>&gt;_</span> TI
        </a>
        <a href="/" class="btn-back">← Back to Home</a>
    </nav>
    <main>
        <div id="content" class="markdown-body">
            <div class="loading">Loading documentation...</div>
        </div>
    </main>
    <script>
        // Fetch and parse the markdown document
        fetch('/docs/TUTORIAL_MANUAL.md')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Could not load the manual. Status: ' + response.status);
                }
                return response.text();
            })
            .then(text => {
                document.getElementById('content').innerHTML = marked.parse(text);
            })
            .catch(error => {
                document.getElementById('content').innerHTML = `
                    <div style="text-align: center; color: #ef4444; margin-top: 50px;">
                        <h2>Error loading manual</h2>
                        <p>${error.message}</p>
                    </div>`;
            });
    </script>
</body>

</html>
